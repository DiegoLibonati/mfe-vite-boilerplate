server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    access_log /dev/stdout;
    error_log /dev/stderr;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location /api/users {
        proxy_pass https://jsonplaceholder.typicode.com/users;
        proxy_set_header Host jsonplaceholder.typicode.com;
        proxy_ssl_server_name on;
    }

    # Reverse-proxy each remote's federation artifacts under the container's
    # single public origin. The trailing slash strips the /mfe/<name>/ prefix,
    # so /mfe/home/remoteEntry.js -> home:8080/remoteEntry.js. Remotes are
    # internal-only (no published ports); they are never reachable directly.
    location ^~ /mfe/home/ {
        proxy_pass http://home:8080/;
    }

    location ^~ /mfe/about/ {
        proxy_pass http://about:8080/;
    }

    location ^~ /mfe/users/ {
        proxy_pass http://users:8080/;
    }

    location ^~ /mfe/not-found/ {
        proxy_pass http://not-found:8080/;
    }

    location ^~ /mfe/product/ {
        proxy_pass http://product:8080/;
    }

    location ^~ /mfe/context/ {
        proxy_pass http://context:8080/;
    }

    location ^~ /mfe/shared/ {
        proxy_pass http://shared:8080/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /remoteEntry.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

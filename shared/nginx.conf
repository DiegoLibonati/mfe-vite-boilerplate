server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    access_log /dev/stdout;
    error_log /dev/stderr;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Access-Control-Allow-Origin "*";

    # Production: serve ONLY the federation artifacts. Consumers load these
    # via the container's /mfe/shared/ reverse proxy (same origin, no CORS).
    # Everything else (index.html, SPA routes) is 404'd, so the standalone app
    # is never reachable in prod.
    location = /remoteEntry.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        return 404;
    }
}

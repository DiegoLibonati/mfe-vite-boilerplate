name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # SHARED
  # ============================================================
  shared-lint-and-audit:
    name: Shared - Lint & Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: shared/.nvmrc
          cache: npm
          cache-dependency-path: shared/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: TypeScript type-check
        run: npm run type-check

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

  shared-test:
    name: Shared - Testing
    runs-on: ubuntu-latest
    needs: shared-lint-and-audit
    defaults:
      run:
        working-directory: shared

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: shared/.nvmrc
          cache: npm
          cache-dependency-path: shared/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

  shared-build:
    name: Shared - Build
    runs-on: ubuntu-latest
    needs: shared-test
    defaults:
      run:
        working-directory: shared

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: shared/.nvmrc
          cache: npm
          cache-dependency-path: shared/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build


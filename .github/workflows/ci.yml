  # ============================================================
  # DOCKER - all images in parallel, after everything
  # ============================================================
  docker-build:
    name: Docker Build - ${{ matrix.project }} ${{ matrix.tag }}
    runs-on: ubuntu-latest
    needs:
      - shared-build
      - container-build
      - home-build
      - about-build
      - users-build
      - notfound-build
      - product-build
      - context-build

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: shared
            dockerfile: Dockerfile.development
            tag: mfe-shared:dev
          - project: container
            dockerfile: Dockerfile.development
            tag: mfe-container:dev
          - project: container
            dockerfile: Dockerfile.production
            tag: mfe-container:prod
          - project: home
            dockerfile: Dockerfile.development
            tag: mfe-home:dev
          - project: home
            dockerfile: Dockerfile.production
            tag: mfe-home:prod
          - project: about
            dockerfile: Dockerfile.development
            tag: mfe-about:dev
          - project: about
            dockerfile: Dockerfile.production
            tag: mfe-about:prod
          - project: users
            dockerfile: Dockerfile.development
            tag: mfe-users:dev
          - project: users
            dockerfile: Dockerfile.production
            tag: mfe-users:prod
          - project: notfound
            dockerfile: Dockerfile.development
            tag: mfe-notfound:dev
          - project: notfound
            dockerfile: Dockerfile.production
            tag: mfe-notfound:prod
          - project: product
            dockerfile: Dockerfile.development
            tag: mfe-product:dev
          - project: product
            dockerfile: Dockerfile.production
            tag: mfe-product:prod
          - project: context
            dockerfile: Dockerfile.development
            tag: mfe-context:dev
          - project: context
            dockerfile: Dockerfile.production
            tag: mfe-context:prod

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build ${{ matrix.project }}/${{ matrix.dockerfile }}
        uses: docker/build-push-action@v6.15.0
        with:
          context: ${{ matrix.project }}
          file: ${{ matrix.project }}/${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.tag }}
